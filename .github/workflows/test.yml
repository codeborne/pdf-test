name: Build
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          cache: 'gradle'
          java-version: '17'
      - name: Run tests in Gradle
        run: ./gradlew clean test --info --rerun-tasks
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-report
          path: build/reports/
